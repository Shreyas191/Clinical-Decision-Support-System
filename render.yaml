services:
  - type: web
    name: cdss-backend
    runtime: python
    buildCommand: pip install -r requirements.txt && python3 data/scripts/pull_openfda.py && python3 data/scripts/parse_synthea.py && python3 vectorstore/ingest.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false   # set manually in Render dashboard
      - key: GOOGLE_API_KEY
        sync: false   # set manually in Render dashboard
    disk:
      name: cdss-data
      mountPath: /opt/render/project/src
      sizeGB: 1
